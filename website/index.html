<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>website</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
  </head>
  <body>
    <div id="error-log" style="color: red; position: fixed; top: 0; left: 0; z-index: 9999; background: white; padding: 20px; font-family: monospace; display: none; width: 100%;"></div>
    <script>
      window.onerror = function(message, source, lineno, colno, error) {
        var log = document.getElementById('error-log');
        log.style.display = 'block';
        log.innerHTML += '<br/>ERROR: ' + message;
      };
      window.addEventListener("unhandledrejection", function(event) {
        var log = document.getElementById('error-log');
        log.style.display = 'block';
        log.innerHTML += '<br/>PROMISE ERROR: ' + event.reason;
      });
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
